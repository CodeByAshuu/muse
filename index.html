<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Muse - Your Shortcut To Clarity</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Playfair Display', serif;
      min-height: 100vh;
      overflow: hidden;
    }
    .container {
      width: 100%;
      height: 100vh;
      border-radius: 0;
      overflow: hidden;
      background: white;
      position: relative;
    }
    .background {
      position: absolute;
      inset: 0;
      background: url('beautiful-anime-landscape-cartoon-scene.jpg') no-repeat center/cover;
      z-index: 0;
    }
    .fade {
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(255,255,255,0.9), rgba(255,255,255,0.4), transparent);
      z-index: 1;
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 40px;
      position: relative;
      z-index: 2;
    }
    header h1 {
      font-size: 22px;
      font-weight: 700;
    }
    nav a {
      margin: 0 15px;
      text-decoration: none;
      color: #333;
      font-size: 15px;
    }
    nav a:hover {
      color: black;
    }
    .signup {
      border: 1px solid black;
      padding: 6px 16px;
      border-radius: 20px;
      background: transparent;
      cursor: pointer;
      font-size: 14px;
    }
    .signup:hover {
      background: black;
      color: white;
    }
    .hero {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 120px 20px 80px;
    }
    .hero h2 {
      font-size: 42px;
      margin-bottom: 15px;
    }
    .hero p {
      font-size: 16px;
      color: #444;
      margin-bottom: 40px;
    }
    .input-box {
      background: rgba(255,255,255,0.6);
      backdrop-filter: blur(12px);
      padding: 20px;
      border-radius: 16px;
      max-width: 600px;
      margin: 0 auto;
      text-align: left;
      box-shadow: 0 6px 20px rgba(0,0,0,0.1);
    }
    .input-box input {
      width: 100%;
      padding: 14px;
      border: none;
      background: transparent;
      font-size: 16px;
      outline: none;
    }
    .actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 10px;
    }
    .actions button {
      border: 1px solid #ccc;
      padding: 6px 14px;
      border-radius: 20px;
      background: white;
      cursor: pointer;
      font-size: 14px;
    }
    .actions button:hover {
      background: rgb(227, 227, 227);
      color: #333;
      border-color: black;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="background"></div>
    <div class="fade"></div>

    <header>
      <h1>Muse</h1>
      <nav>
        <a href="#">Solutions</a>
        <a href="#">Features</a>
        <a href="#">Pricing</a>
        <button class="signup">Sign up</button>
      </nav>
    </header>

    <div class="hero">
      <h2>Your Shortcut To Clarity</h2>
      <p>Save Your Thoughts The Moment They Appear, And Keep Them Effortlessly Organized So You Can Always Find What Matters.</p>
      <div class="input-box">
        <input type="text" id="thoughtInput" placeholder="Type a thought or press / for quick actions">
        <div class="actions">
          <button onclick="attachFile()">📎</button>
          <div>
            <button onclick="archiveThought()">Archive</button>
            <button onclick="saveThought()">Save</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    function attachFile() {
      alert("Attach file clicked");
    }
    function archiveThought() {
      let input = document.getElementById("thoughtInput").value;
      alert("Archived: " + input);
    }
    function saveThought() {
      let input = document.getElementById("thoughtInput").value;
      alert("Saved: " + input);
    }
  </script>
</body>
</html>
